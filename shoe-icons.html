<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schuh Icon Vorschläge</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#071a0e; color:#dcfce7; font-family:sans-serif; padding:30px; }
  h1 { color:#4ade80; font-size:14px; letter-spacing:4px; text-transform:uppercase; margin-bottom:24px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px; }
  .card {
    background:#0f2d1a; border-radius:16px; padding:20px;
    display:flex; flex-direction:column; align-items:center; gap:12px;
    border:1px solid #1a4028; cursor:pointer; transition:border-color .2s, transform .15s;
  }
  .card:hover { border-color:#4ade80; transform:translateY(-2px); }
  .icon-wrap {
    width:52px; height:52px; background:#071a0e; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    color:#4ade80;
  }
  .num { font-size:10px; color:#1a4028; letter-spacing:2px; }
  .label { font-size:11px; color:#6b9e7a; text-align:center; letter-spacing:1px; }

  /* Overlay */
  .overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95);
    z-index:100; align-items:center; justify-content:center; flex-direction:column; gap:20px;
  }
  .overlay.active { display:flex; }
  .ov-box {
    background:#0f2d1a; border-radius:20px; padding:30px 40px;
    display:flex; flex-direction:column; align-items:center; gap:16px;
    border:1px solid #1a4028; max-width:500px; width:90%;
  }
  .ov-icon { color:#4ade80; }
  .ov-num { font-size:11px; color:#4ade80; letter-spacing:3px; }
  .ov-label { font-size:13px; color:#6b9e7a; }
  .ov-code {
    background:#071a0e; border-radius:10px; padding:14px;
    font-size:11px; color:#6b9e7a; font-family:monospace;
    width:100%; word-break:break-all; line-height:1.6;
    border:1px solid #1a4028;
  }
  .copy-btn {
    background:#4ade80; color:#071a0e; border:none; border-radius:10px;
    padding:10px 24px; font-size:12px; font-weight:700; cursor:pointer;
    letter-spacing:1px;
  }
  .copy-btn:active { opacity:0.8; }
  .close-btn {
    background:transparent; color:#4ade80; border:1px solid #1a4028;
    border-radius:10px; padding:8px 20px; font-size:12px; cursor:pointer;
  }
</style>
</head>
<body>
<h1>Schuh Icon · 20 Vorschläge</h1>
<div class="grid" id="grid"></div>

<div class="overlay" id="overlay" onclick="closeOverlay()">
  <div class="ov-box" onclick="event.stopPropagation()">
    <div class="ov-num" id="ov-num"></div>
    <div class="ov-icon" id="ov-icon"></div>
    <div class="ov-label" id="ov-label"></div>
    <div class="ov-code" id="ov-code"></div>
    <button class="copy-btn" onclick="copyCode()">SVG kopieren</button>
    <button class="close-btn" onclick="closeOverlay()">Schließen</button>

function buildGrid() {
  const g = document.getElementById('grid');
  icons.forEach((ic, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="num">#${String(i+1).padStart(2,'0')}</div>
      <div class="icon-wrap">${ic.svg}</div>
      <div class="label">${ic.label}</div>
    `;
    card.onclick = () => openOverlay(i);
    g.appendChild(card);
  });
}

function openOverlay(i) {
  const ic = icons[i];
  document.getElementById('ov-num').textContent = `#${String(i+1).padStart(2,'0')}`;
  document.getElementById('ov-icon').innerHTML = ic.svg.replace('width="24" height="24"', 'width="72" height="72"');
  document.getElementById('ov-label').textContent = ic.label;
  document.getElementById('ov-code').textContent = ic.svg.trim();
  document.getElementById('overlay').classList.add('active');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
}

function copyCode() {
  const code = document.getElementById('ov-code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Kopiert ✓';
    setTimeout(() => btn.textContent = 'SVG kopieren', 1500);
  });
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeOverlay(); });
buildGrid();
</script>
