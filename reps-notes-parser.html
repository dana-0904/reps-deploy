function normalizeName(raw) {
  const stripped = raw
    .replace(/\([^)]*\)/g, '')
    .replace(/\s+/g, ' ')
    .trim();
  const lower = stripped.toLowerCase();
  for (const [key, val] of EX_MAP) {
    if (lower === key || lower.startsWith(key) || lower.includes(key)) {
      return val;
    }
  }
  // Capitalize each word of original
  return stripped.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

const SKIP_RE = [
  /stairmaster/i, /stepper/i, /cardio/i, /fahrrad/i,
  /stair\s*master/i, /^\s*>/, /^\s*\(/,
  /^\s*(training|stairmaster)\s*$/i,
  /\d+\s*min\s*(stair|stepper|cardio)/i,
  /^(montag|dienstag|mittwoch|donnerstag|freitag|samstag|sonntag)\s*,/i,
  /^training$/i,
];

function shouldSkip(line) {
  return SKIP_RE.some(r => r.test(line.trim()));
}

function parseSets(raw) {
  const sets = [];
  // Handle "Hip Thrust Machine 3x10 30kg" — weight comes AFTER sets
  // Normalize: find weight anywhere, find NxM patterns
  const parts = raw.split('/').map(s => s.trim()).filter(Boolean);
  let lastKg = null;

  for (const part of parts) {
    // Find weight (could be "30kg" or "3x10 30kg" format)
    const wMatch = part.match(/(\d+(?:[,\.]\d+)?)\s*kg/i);
    if (wMatch) lastKg = parseFloat(wMatch[1].replace(',', '.'));
    if (!lastKg) continue;

    // NxM patterns
    const setsReps = [...part.matchAll(/(\d+)\s*x\s*(\d+)/g)];
    if (setsReps.length > 0) {
      for (const m of setsReps) {
        const n = parseInt(m[1]), r = parseInt(m[2]);
        // Sanity: if n > 6 it's probably sets*reps reversed, keep as-is
        for (let i = 0; i < n; i++) sets.push({ kg: lastKg, reps: r, done: true });
      }
    } else {
      // "x10" alone = 1 set
      const xm = part.match(/\bx\s*(\d+)/);
      if (xm) sets.push({ kg: lastKg, reps: parseInt(xm[1]), done: true });
    }
  }
  return sets;
}

const HEADER_RE = /^(montag|dienstag|mittwoch|donnerstag|freitag|samstag|sonntag)[,.]?\s*(\d{1,2})\.(\d{1,2})\.?(\d{4})?\s*[:\s]\s*(.+)/i;

function getWorkoutId(desc) {
  const l = desc.toLowerCase();
  if (/legs|glutes|bein|squat/.test(l)) return 'leg-day';
  return 'upper-body';
}

function inferYear(day, month, prevDate) {
  const maxDate = new Date('2026-03-29T23:59:00');
  for (const yr of [2026, 2025, 2024]) {
    const d = new Date(yr, month - 1, day);
    if (d > maxDate) continue;
    if (!prevDate || d <= prevDate) return yr;
  }
  return 2025;
}

function parseExLine(line) {
  const trimmed = line.trim();
  // Find first weight occurrence
  const wi = trimmed.search(/\d+(?:[,\.]\d+)?\s*kg/i);
  // Also handle "3x10 30kg" format — but let's find earliest NxM or kg
  const setStart = trimmed.search(/\d+\s*x\s*\d+|\d+(?:[,\.]\d+)?\s*kg/i);
  if (setStart <= 0) return null;

  let nameRaw = trimmed.slice(0, setStart).replace(/:$/, '').trim();
  let setData = trimmed.slice(setStart).trim();

  if (!nameRaw || nameRaw.length < 2) return null;
  return { nameRaw, setData };
}

function parseNotes(text) {
  const lines = text.split('\n');
  const logs = [];
  let current = null;
  let prevDate = null;

  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;

    // Check header
    const hm = line.match(HEADER_RE);
    if (hm) {
      if (current && current.exercises.length > 0) logs.push(current);

      const day = parseInt(hm[2]);
      const month = parseInt(hm[3]);
      const yr = hm[4] ? parseInt(hm[4]) : inferYear(day, month, prevDate);
      const dateStr = `${yr}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      prevDate = new Date(yr, month - 1, day);

      current = {
        workoutId: getWorkoutId(hm[5]),
        date: dateStr,
        duration: 60,
        exercises: [],
        _label: hm[5].trim(),
      };
      continue;
    }

    if (!current || shouldSkip(line)) continue;

    const parsed = parseExLine(line);
    if (!parsed) continue;

    const { nameRaw, setData } = parsed;
    if (shouldSkip(nameRaw)) continue;

    const name = normalizeName(nameRaw);
    const sets = parseSets(setData);
    if (sets.length === 0) continue;

    const existing = current.exercises.find(e => e.name === name);
    if (existing) {
      existing.sets.push(...sets);
    } else {
      current.exercises.push({ name, sets });
    }
  }

  if (current && current.exercises.length > 0) logs.push(current);

  // Return oldest-first
  return logs.reverse();
}

// ─── RUN PARSER ─────────────────────────────────────────────────
const logs = parseNotes(RAW_NOTES);

// ─── RENDER STATS ───────────────────────────────────────────────
const totalSets = logs.reduce((a, l) => a + l.exercises.reduce((b, e) => b + e.sets.length, 0), 0);
const upper = logs.filter(l => l.workoutId === 'upper-body').length;
const legs = logs.filter(l => l.workoutId === 'leg-day').length;
const exNames = new Set(logs.flatMap(l => l.exercises.map(e => e.name)));

document.getElementById('stats').innerHTML = [
  { val: logs.length,       label: 'SESSIONS' },
  { val: upper,             label: 'UPPER BODY' },
  { val: legs,              label: 'LEG DAY' },
  { val: totalSets,         label: 'TOTAL SETS' },
  { val: exNames.size,      label: 'EXERCISES' },
].map(s => `<div class="stat"><div class="stat-val">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join('');

// ─── RENDER TABLE ───────────────────────────────────────────────
const tbody = document.getElementById('tbody');
[...logs].reverse().forEach((log, i) => {
  const cls = log.workoutId === 'upper-body' ? 'upper' : 'legs';
  const label = log.workoutId === 'upper-body' ? 'UPPER BODY' : 'LEG DAY';
  const sets = log.exercises.reduce((a, e) => a + e.sets.length, 0);
  const exList = log.exercises.map(e =>
    `<span class="ex-name">${e.name}</span> <span class="sets-count">(${e.sets.length} sets)</span>`
  ).join('<br>');
  tbody.innerHTML += `<tr>
    <td>${logs.length - i}</td>
    <td>${log.date}</td>
    <td><span class="${cls}">${label}</span></td>
    <td><div class="ex-list">${exList}</div></td>
    <td>${sets}</td>
  </tr>`;
});

// ─── COPY JSON ──────────────────────────────────────────────────
const exportLogs = logs.map(({ _label, ...l }) => l); // remove internal _label

function copyJSON() {
  const json = JSON.stringify(exportLogs, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    const el = document.getElementById('copied');
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 2500);
  });
}

function toggleRaw() {
  const el = document.getElementById('raw');
  if (el.style.display === 'none') {
    el.style.display = 'block';
    el.textContent = JSON.stringify(exportLogs, null, 2);
  } else {
    el.style.display = 'none';
  }
}
</script>
