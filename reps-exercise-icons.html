<script>
// ═══════════════════════════════════════
// DRAWING HELPERS
// ═══════════════════════════════════════
const FIG = '#d4d4d4';   // body fill
const FIG2 = '#b0b0b0';  // secondary body / shadow side
const BAR = '#aaa';      // barbell bar
const PLAT = '#888';     // plate rim
const PLAT2 = '#bbb';    // plate face
const EQP = '#666';      // machine frame
const BENCH = '#3a3a3a'; // bench
const LIME = '#c6f135';
const CYAN = '#00d4f0';
const PINK = '#ff4d6a';
const VIOL = '#a78bfa';
const GND = '#2a2a2a';   // floor

// Thick line segment (filled rectangle along a vector)
function seg(x1,y1,x2,y2,w,col){
  const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);
  if(len<0.001) return '';
  const nx=-dy/len*w/2,ny=dx/len*w/2;
  return `<polygon points="${x1+nx},${y1+ny} ${x2+nx},${y2+ny} ${x2-nx},${y2-ny} ${x1-nx},${y1-ny}" fill="${col||FIG}"/>`;
}
// Tapered segment (w1 at start, w2 at end)
function tseg(x1,y1,x2,y2,w1,w2,col){
  const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);
  if(len<0.001) return '';
  const nx=-dy/len,ny=dx/len;
  const hw1=w1/2,hw2=w2/2;
  return `<polygon points="${x1+nx*hw1},${y1+ny*hw1} ${x2+nx*hw2},${y2+ny*hw2} ${x2-nx*hw2},${y2-ny*hw2} ${x1-nx*hw1},${y1-ny*hw1}" fill="${col||FIG}"/>`;
}
// Circle
function circ(cx,cy,r,fill,strokeCol,sw){
  return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill||FIG}"${strokeCol?` stroke="${strokeCol}" stroke-width="${sw||1}"`:''}/>`;
}
// Rounded rect
function rr(x,y,w,h,rx,fill){
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx||2}" fill="${fill||FIG}"/>`;
}
// Ellipse
function ell(cx,cy,rx,ry,fill){
  return `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="${fill||FIG}"/>`;
}
// Barbell plate (circle + ring cutout)
function plate(cx,cy,or,ir,fill,rimCol){
  return `${circ(cx,cy,or,fill||PLAT2)}${circ(cx,cy,ir||or*.4,'#1a1a1a')}${circ(cx,cy,or,rimCol||PLAT,'none',1)}`;
}
// Barbell (bar + 2 plates each side)
function barbell(x1,y1,x2,y2,pW,pH,col){
  const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);
  const ux=dx/len,uy=dy/len;
  const nx=-uy,ny=ux;
  const bh=pW||8,pw=pH||5;
  // bar
  let out=seg(x1,y1,x2,y2,2.5,col||BAR);
  // collars
  const c1x=x1+ux*pw,c1y=y1+uy*pw;
  const c2x=x2-ux*pw,c2y=y2-uy*pw;
  out+=seg(c1x-ux*pw*.2,c1y-uy*pw*.2,c2x+ux*pw*.2,c2y+uy*pw*.2,bh,PLAT2);
  out+=seg(c1x-ux*pw*.2,c1y-uy*pw*.2,c2x+ux*pw*.2,c2y+uy*pw*.2,2.5,col||BAR);
  // outer plates
  out+=seg(x1,y1,x1+ux*pw,y1+uy*pw,bh+6,PLAT);
  out+=seg(x2,y2,x2-ux*pw,y2-uy*pw,bh+6,PLAT);
  out+=seg(x1,y1,x1+ux*pw*.4,y1+uy*pw*.4,bh+10,PLAT2);
  out+=seg(x2,y2,x2-ux*pw*.4,y2-uy*pw*.4,bh+10,PLAT2);
  out+=seg(x1,y1,x2,y2,2.5,col||BAR);
  return out;
}
// Head (detailed silhouette)
function head(cx,cy,sz,col){
  sz=sz||5;
  return ell(cx,cy,sz*.7,sz,col||FIG)+rr(cx-sz*.45,cy+sz*.7,sz*.9,sz*.5,sz*.2,col||FIG);
}
// Upper body (torso)
function torso(cx,cy,w,h,col){
  const tw=w*.8;
  return `<polygon points="${cx-w/2},${cy} ${cx+w/2},${cy} ${cx+tw/2},${cy+h} ${cx-tw/2},${cy+h}" fill="${col||FIG}"/>`;
}
// Ground line
function gnd(y){ return rr(2,y,56,2,1,GND); }
// Bench shape
function bench(x,y,w,h){ return rr(x,y,w,h,2,BENCH)+rr(x+w*.15,y-h*.6,w*.15,h*.6,1.5,BENCH); }

// Dumbbell
function dumbbell(cx,cy,len,angle,col){
  const rad=angle*Math.PI/180;
  const ux=Math.cos(rad),uy=Math.sin(rad);
  const hl=len/2;
  const x1=cx-ux*hl,y1=cy-uy*hl;
  const x2=cx+ux*hl,y2=cy+uy*hl;
  return seg(x1,y1,x2,y2,2,col||BAR)+
    ell(x1,y1,len*.22,len*.14,col||PLAT2)+
    ell(x2,y2,len*.22,len*.14,col||PLAT2);
}

// Cable dot
function cable(x1,y1,x2,y2){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#555" stroke-width="1.2" stroke-dasharray="2,1"/>`;
}

// SVG wrapper with dark gradient bg
function svg(content, accent){
  return `<svg viewBox="0 0 60 60" width="52" height="52">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
  </defs>
  <rect width="60" height="60" rx="10" fill="url(#bg)"/>
  ${content}
</svg>`;
}
