<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPS. Workout Card Images</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; color:#fff; font-family:sans-serif; padding:20px; }
  h1 { text-align:center; color:#c6f135; margin-bottom:8px; font-size:18px; letter-spacing:4px; }
  .subtitle { text-align:center; color:#444; font-size:11px; letter-spacing:2px; margin-bottom:28px; }
  .section { color:#666; font-size:10px; letter-spacing:3px; text-transform:uppercase; margin:24px 0 12px; padding-left:4px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
  .card {
    background:#0d0d0d; border-radius:16px; border:1px solid #222;
    overflow:hidden; cursor:pointer; transition:border-color .2s;
  }
  .card:hover { border-color:#c6f135; }
  .img-area { height:140px; position:relative; overflow:hidden; }
  .img-area svg { width:100%; height:100%; }
  .card-meta { padding:10px 14px 12px; }
  .card-num { font-size:10px; color:#555; font-family:monospace; }
  .card-name { font-size:12px; color:#aaa; margin-top:2px; letter-spacing:1px; text-transform:uppercase; }
  .overlay {
    display:none; position:fixed; inset:0; background:#000;
    z-index:100; align-items:center; justify-content:center; flex-direction:column;
    cursor:pointer;
  }
  .overlay.active { display:flex; }
  .overlay svg { width:min(90vw,480px); height:min(60vh,320px); }
  .overlay-label { color:#444; font-size:11px; letter-spacing:3px; margin-top:16px; }
</style>
</head>

<div class="subtitle">20 PROPOSALS · BLACK & WHITE · CLICK TO PREVIEW</div>

function buildGrid(items, id) {
  const g = document.getElementById(id);
  items.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="img-area">${c.svg}</div>
      <div class="card-meta"><div class="card-num">#${c.n}</div><div class="card-name">${c.name}</div></div>`;
    card.onclick = () => {
      document.getElementById('ov-svg').innerHTML = c.svg;
      document.getElementById('ov-label').textContent = `#${c.n} · ${c.name} — tap to close`;
      document.getElementById('overlay').classList.add('active');
    };
    g.appendChild(card);
  });
}

buildGrid(upperBody, 'grid-ub');
buildGrid(legDay, 'grid-ld');

function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeOverlay(); });
</script>
